<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">

</head>

<body>

    <div class="calculator">

        <input type="text" id="screen" disabled>

        <div class="buttons">
            <!-- Top Row -->
            <button class="clear" onclick="allClear()">AC</button>
            <button class="clear" onclick="deleteLast()">DEL</button>
            <button class="op" onclick="togglePower()" id="powerBtn">OFF</button>
            <button class="op" onclick="press('/')">/</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="op" onclick="press('*')">*</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="op" onclick="press('-')">-</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="op" onclick="press('+')">+</button>

            <button onclick="press('00')">00</button>
            <button onclick="press('0')">0</button>
             <button class="equal" onclick="calculate()">=</button>

         
            <button class="op" onclick="percent()">%</button>

          

        </div>

    </div>

    <script src="calculator.js"></script>

</body>

</html>
